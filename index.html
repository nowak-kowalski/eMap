<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>eMap — Пермь</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.3.0/maptiler-sdk.css" rel="stylesheet">
<link href="src/styles.css" rel="stylesheet">
</head>
<body>

<!-- Desktop: phone frame wrapper -->
<div class="phone-frame" id="phoneFrame">

  <!-- Grain texture -->
  <div class="grain"></div>

  <!-- Map container -->
  <div id="map"></div>
  <div id="map-overlay"></div>

  <!-- Dot gradient at top -->
  <div id="top-dot-vignette"></div>

  <!-- Header -->
  <header class="header">
    <img src="images/12.png" class="logo" alt="МММ БОТ">
    <div class="header-right">
      <img src="images/serch.png" class="btn-icon-img" title="Поиск" alt="Поиск">
      <button class="header-menu-btn" id="mapMenuButton" type="button" aria-label="Открыть меню">
        <img src="images/menu.png" class="btn-icon-img" title="Меню" alt="Меню">
      </button>
    </div>
  </header>

  <!-- Filter chips (hidden) -->
  <div class="chips-wrap"></div>


  <!-- Bottom Sheet -->
  <div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheetHandle">
      <div class="handle-bar"></div>
      <div class="sheet-top">
        <div style="display:flex; align-items:center; gap:10px;">
          <img src="images/65.png" class="afisha-badge-img" alt="Афиша">
          <span class="date-pill">9.04 — 12.04</span>
        </div>
      </div>
    </div>

    <div class="events-list" id="eventsList"></div>
  </div>

  <!-- Place popup -->
  <div class="place-popup" id="placePopup">
    <div class="popup-img-wrap">
      <img class="popup-img" id="popupImg" src="" alt="">
      <div class="popup-img-grad"></div>
      <button class="popup-close">✕</button>
    </div>
    <div class="popup-content">
      <div class="popup-type-badge" id="popupBadge"></div>
      <img class="popup-badge-img" id="popupBadgeImg" src="" alt="" style="display:none">
      <div class="popup-name" id="popupName"></div>
      <div class="popup-venue" id="popupVenue"></div>
      <div class="popup-meta-row">
        <span class="popup-date-chip" id="popupDate"></span>
        <span class="popup-price-tag" id="popupPrice"></span>
      </div>
      <a class="popup-btn" id="popupBtn" href="#" target="_blank">Перейти →</a>
    </div>
  </div>

  <!-- ========== SEARCH SCREEN ========== -->
  <div id="search-screen" class="ss-wrap ss-hidden">

    <div class="ss-body">
      <h1 class="ss-heading">Че&nbsp;ищем?</h1>

      <div class="ss-search-row">
        <svg class="ss-icon-mg" width="25" height="26" viewBox="0 0 25 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8.94369" y="10.5759" width="2.37967" height="15.9797" transform="rotate(-42 8.94369 10.5759)" fill="white" stroke="#2E2D2C" stroke-width="1.313"/>
          <circle cx="8.47365" cy="8.47365" r="6.5" transform="rotate(-42 8.47365 8.47365)" fill="#F2A0A4" stroke="#2E2D2C"/>
        </svg>
        <input class="ss-input" type="text" placeholder="поиск">
        <button class="ss-submit">Искать</button>
      </div>

      <div class="ss-chips">
        <button class="ss-chip">Поесть</button>
        <button class="ss-chip">Выпить</button>
        <button class="ss-chip">Что-то ещё</button>
      </div>
    </div>

    <nav class="ss-nav" id="ssNav">

      <button class="ss-tab ss-tab--active" data-tab="search">
        <span class="ss-tab-icon">
          <svg width="25" height="26" viewBox="0 0 25 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8.94369" y="10.5759" width="2.37967" height="15.9797" transform="rotate(-42 8.94369 10.5759)" fill="white" stroke="#2E2D2C" stroke-width="1.313"/>
            <circle cx="8.47365" cy="8.47365" r="6.5" transform="rotate(-42 8.47365 8.47365)" fill="#F2A0A4" stroke="#2E2D2C"/>
          </svg>
        </span>
        <span class="ss-tab-label">Поиск</span>
      </button>

      <button class="ss-tab" data-tab="categories">
        <span class="ss-tab-icon">
          <svg class="ss-categories-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0.5 16.25C0.5 19.1495 2.85051 21.5 5.75 21.5C8.64954 21.5 11 19.1495 11 16.25C11 19.1495 13.3505 21.5 16.25 21.5C19.1495 21.5 21.5 19.1495 21.5 16.25C21.5 13.3505 19.1495 11 16.25 11C19.1495 11 21.5 8.64954 21.5 5.75C21.5 2.85046 19.1495 0.5 16.25 0.5C13.3505 0.5 11 2.85046 11 5.75C11 2.85046 8.64954 0.5 5.75 0.5C2.85051 0.5 0.5 2.85046 0.5 5.75C0.5 8.64954 2.85051 11 5.75 11C2.85051 11 0.5 13.3505 0.5 16.25Z" fill="#F2A0A4" stroke="black"/>
          </svg>
        </span>
        <span class="ss-tab-label">Категории</span>
      </button>

      <button class="ss-tab" data-tab="map">
        <span class="ss-tab-icon">
          <img src="images/point.png" alt="Карта">
        </span>
        <span class="ss-tab-label">Карта</span>
      </button>

      <button class="ss-tab" data-tab="friends">
        <span class="ss-tab-icon">
          <svg class="ss-friends-icon" width="28" height="25" viewBox="0 0 28 25" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M27.5 7.3178C27.5 3.50225 24.4016 0.5 20.5836 0.5C17.5006 0.5 14.8926 2.56184 13.9992 5.34774C13.1052 2.5622 10.4972 0.571751 7.41415 0.571751C3.59538 0.571751 0.5 3.48841 0.5 7.30541C0.5 9.2314 1.29054 10.5921 2.56284 12.0483L14.0056 23.5L25.4353 12.0483C26.7087 10.5921 27.5 9.24232 27.5 7.3178Z" fill="#F2A0A4" stroke="black"/>
          </svg>
        </span>
        <span class="ss-tab-label">С другом</span>
      </button>

    </nav>
  </div>

</div><!-- /phone-frame -->

<script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.3.0/maptiler-sdk.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="data/perm-krai-boundary.js"></script>
<script src="data/places.js"></script>
<script src="data/events.js"></script>
<script src="src/app.js"></script>

<!-- ========== ONBOARDING ========== -->
<div id="onboarding" class="ob-wrap">

  <div class="ob-art" aria-hidden="true"></div>

  <div class="ob-panel">
    <!-- Slides -->
    <div class="ob-slides" id="obSlides">

      <!-- 1: Приветствие -->
      <div class="ob-slide">
        <div class="ob-copy">
          <h1 class="ob-title">Приветствие</h1>
          <p class="ob-sub">дополнительная<br>информация</p>
        </div>
      </div>

      <!-- 2: Гастробот -->
      <div class="ob-slide">
        <div class="ob-copy">
          <h1 class="ob-title">Это гастробот</h1>
          <p class="ob-sub">тут описание<br>гастробота</p>
        </div>
      </div>

      <!-- 3: Найдем место -->
      <div class="ob-slide">
        <div class="ob-copy">
          <h1 class="ob-title">Найдем место<br>за 10 секунд</h1>
          <p class="ob-sub">можешь искать как хочешь:<br>словами или кнопками</p>
        </div>
      </div>

      <!-- 4: Летсгоу -->
      <div class="ob-slide">
        <div class="ob-copy">
          <h1 class="ob-title">Летсгоу</h1>
        </div>
      </div>

    </div>

  </div>

  <button class="ob-arrow" id="obArrow" aria-label="Дальше">
    <svg class="ob-arrow-icon" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
      <path d="M10 32H50"></path>
      <path d="M34 16L50 32L34 48"></path>
    </svg>
  </button>

  <div class="ob-dots" id="obDots">
    <span class="ob-dot active"></span>
    <span class="ob-dot"></span>
    <span class="ob-dot"></span>
    <span class="ob-dot"></span>
  </div>

</div>


<script src="src/search.js"></script>
<script src="src/onboarding.js"></script>

</body>
</html>
